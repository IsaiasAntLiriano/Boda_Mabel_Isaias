<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Isaías & Mabel — Save the Date</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500;600&family=Alex+Brush&family=Montserrat:wght@300;400;500;600&display=swap');

  :root{
    --sky:#eaf2f9;
    --sky-deep:#cfe3f2;
    --dress-blue:#4f8fc4;
    --navy:#1f3b57;
    --navy-deep:#132639;
    --cream:#fbf7f0;
    --gold:#c6a15b;
    --gold-soft:#e4d3ac;
    --ink:#233442;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html{
    width:100%;
    overflow-x:hidden;
  }

  body{
    width:100%;
    min-height:100%;
    margin:0;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 20% 10%, #ffffff 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, var(--sky-deep) 0%, transparent 55%),
      linear-gradient(160deg, var(--sky) 0%, #dfeaf4 55%, var(--sky-deep) 100%);
    font-family:'Montserrat', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  .stage{
    width:100%;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    box-sizing:border-box;
  }

  /* floating leaf-like soft blobs to echo the greenery/blue photo backdrop */
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(40px);
    opacity:.35;
    z-index:0;
    pointer-events:none;
  }
  .blob1{width:280px;height:280px; background:var(--dress-blue); top:-80px; left:-80px;}
  .blob2{width:220px;height:220px; background:var(--gold-soft); bottom:-60px; right:-60px;}

  .invite-stack{
    position:relative;
    width:100%;
    max-width:430px;
    margin:0 auto;
  }

  /* ---------- ENVELOPE ---------- */
  #envelope-wrap{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:min(420px, 88vw);
    aspect-ratio: 4/3;
    perspective: 1800px;
    z-index:2;
    transition: transform .8s ease, opacity .8s ease;
    cursor:pointer;
  }

  #envelope-wrap.hidden{
    opacity:0;
    transform: translateX(-50%) scale(.85) translateY(-30px);
    pointer-events:none;
  }

  .envelope{
    position:absolute;
    inset:0;
    border-radius:6px;
    box-shadow: 0 25px 60px -15px rgba(19,38,57,.35), 0 8px 20px -8px rgba(19,38,57,.25);
    transition: transform .35s ease, box-shadow .35s ease;
  }

  #envelope-wrap:not(.opening):hover .envelope{
    transform: translateY(-4px);
    box-shadow: 0 32px 70px -15px rgba(19,38,57,.4), 0 10px 24px -8px rgba(19,38,57,.3);
  }
  #envelope-wrap:not(.opening):active .envelope{
    transform: translateY(-1px) scale(.99);
  }
  #envelope-wrap:not(.opening):hover .seal{
    transform:translate(-50%,-50%) scale(1.08);
    box-shadow: 0 8px 18px rgba(0,0,0,.3), inset 0 2px 3px rgba(255,255,255,.45);
  }

  .env-back{
    position:absolute; inset:0;
    background: linear-gradient(160deg, var(--cream), #f2ece0);
    border-radius:6px;
    overflow:hidden;
  }
  .env-back::before{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(135deg, transparent 49.3%, rgba(31,59,87,.06) 49.3%, rgba(31,59,87,.06) 50.7%, transparent 50.7%);
  }

  .env-inner-shadow{
    position:absolute; inset:6px;
    border:1px solid var(--gold-soft);
    border-radius:3px;
    pointer-events:none;
  }

  .env-card-peek{
    position:absolute;
    left:8%; right:8%;
    bottom:6%;
    top:14%;
    background: var(--cream);
    border-radius:4px;
    box-shadow: 0 -4px 18px rgba(19,38,57,.15);
    transform: translateY(0);
    transition: transform 1s cubic-bezier(.22,1,.36,1);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding-top:14%;
    z-index:2;
  }
  .env-card-peek span{
    font-family:'Cinzel', serif;
    letter-spacing:3px;
    font-size:.7rem;
    color:var(--navy);
  }

  .env-flap-bottom{
    position:absolute; left:0; right:0; bottom:0; height:60%;
    background: linear-gradient(160deg, #f7f1e6, #ece3d1);
    clip-path: polygon(0 100%, 100% 100%, 100% 30%, 50% 0%, 0 30%);
    z-index:3;
    border-radius: 0 0 6px 6px;
  }
  .env-flap-left{
    position:absolute; left:0; top:0; bottom:0; width:52%;
    background: linear-gradient(100deg, #f4ede0, #e9ddc4);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    z-index:3;
    opacity:.9;
  }
  .env-flap-right{
    position:absolute; right:0; top:0; bottom:0; width:52%;
    background: linear-gradient(260deg, #f4ede0, #e9ddc4);
    clip-path: polygon(100% 0, 0 50%, 100% 100%);
    z-index:3;
    opacity:.9;
  }

  .env-flap-top{
    position:absolute; left:0; right:0; top:0; height:60%;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 1.1s cubic-bezier(.65,0,.35,1);
    z-index:5;
  }
  .env-flap-top-face{
    position:absolute; inset:0;
    background: linear-gradient(200deg, #fdfaf3, #eee3cb);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    border-radius: 6px 6px 0 0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .seal{
    position:absolute;
    top:38%;
    left:50%;
    transform:translate(-50%,-50%);
    width:58px; height:58px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #d8b878, var(--gold) 55%, #a9803c 100%);
    box-shadow: 0 6px 14px rgba(0,0,0,.25), inset 0 2px 3px rgba(255,255,255,.4);
    display:flex; align-items:center; justify-content:center;
    z-index:6;
    cursor:pointer;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .seal:hover{ transform:translate(-50%,-50%) scale(1.06); }
  .seal:active{ transform:translate(-50%,-50%) scale(.95); }
  .seal svg{ width:26px; height:26px; }

  .env-wrap-front{
    position:absolute; inset:0;
    border-radius:6px;
    box-shadow: inset 0 0 0 1px rgba(198,161,91,.35);
    pointer-events:none;
    z-index:7;
  }

  #tap-hint{
    position:absolute;
    bottom:-42px;
    left:0; right:0;
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1rem;
    color:var(--navy);
    opacity:.75;
    letter-spacing:.5px;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:.45;}
    50%{opacity:.9;}
  }

  #envelope-wrap.opening .env-flap-top{
    transform: rotateX(180deg);
    z-index:1;
  }
  #envelope-wrap.opening .env-card-peek{
    transform: translateY(-46%);
  }
  #envelope-wrap.opening .seal{
    opacity:0;
    transform:translate(-50%,-50%) scale(.4);
  }

  /* ---------- CARD (revealed content) ---------- */
  #card{
    position:relative;
    z-index:4;
    width:min(430px, 92vw);
    max-width:430px;
    margin:0 auto;
    background: var(--cream);
    border-radius:10px;
    box-shadow: 0 30px 70px -20px rgba(19,38,57,.4);
    overflow:hidden;
    opacity:0;
    transform: translateY(40px) scale(.96);
    transition: opacity 1s ease .2s, transform 1s cubic-bezier(.22,1,.36,1) .2s;
  }
  #card.show{
    opacity:1;
    transform: translateY(0) scale(1);
  }

  .card-frame{
    border: 1px solid var(--gold-soft);
    margin:10px;
    border-radius:6px;
    overflow:hidden;
  }

  .photo-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 3/4;
    overflow:hidden;
  }
  .photo-wrap img{
    width:100%; height:100%;
    object-fit:cover;
    object-position: 50% 15%;
    display:block;
    filter: saturate(1.03) contrast(1.02);
  }
  .photo-fade{
    position:absolute; left:0; right:0; bottom:0; height:45%;
    background: linear-gradient(to top, var(--cream) 0%, rgba(251,247,240,0) 100%);
  }
  .photo-eyebrow{
    position:absolute; top:16px; left:0; right:0;
    text-align:center;
    font-family:'Cinzel', serif;
    letter-spacing:5px;
    font-size:.62rem;
    color:#fff;
    text-shadow: 0 1px 6px rgba(0,0,0,.5);
  }

  .content{
    padding: 4px 28px 30px;
    text-align:center;
  }

  .names{
    font-family:'Alex Brush', cursive;
    font-size:2.7rem;
    line-height:1;
    color:var(--navy);
    margin-top:-18px;
    position:relative;
    z-index:2;
  }
  .amp{
    display:block;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1rem;
    color:var(--dress-blue);
    letter-spacing:2px;
    margin:2px 0;
  }

  .divider{
    display:flex; align-items:center; gap:10px;
    margin: 14px auto 12px;
    width:70%;
  }
  .divider .line{ flex:1; height:1px; background: var(--gold-soft); }
  .divider .dot{ width:5px; height:5px; border-radius:50%; background:var(--gold); }

  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.05rem;
    color:var(--ink);
    opacity:.85;
    margin-bottom:18px;
  }

  .date-block{
    font-family:'Cinzel', serif;
    color:var(--navy);
    letter-spacing:2px;
  }
  .date-block .day{
    font-size:2.4rem;
    font-weight:500;
    line-height:1;
  }
  .date-block .rest{
    font-size:.85rem;
    letter-spacing:3px;
    margin-top:4px;
    color:var(--dress-blue);
  }

  .place{
    margin-top:10px;
    font-family:'Montserrat', sans-serif;
    font-size:.78rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--ink);
    opacity:.65;
  }

  /* countdown */
  .countdown-label{
    margin-top:24px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:.95rem;
    color:var(--ink);
    opacity:.8;
  }
  .countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:12px;
  }
  .cd-unit{
    background: linear-gradient(160deg, var(--navy), var(--navy-deep));
    color:var(--cream);
    border-radius:8px;
    padding:10px 8px 8px;
    min-width:56px;
    box-shadow: 0 8px 18px -6px rgba(19,38,57,.5);
  }
  .cd-num{
    font-family:'Cinzel', serif;
    font-size:1.5rem;
    font-weight:600;
    letter-spacing:1px;
  }
  .cd-unit-label{
    font-size:.55rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    opacity:.75;
    margin-top:2px;
  }

  .past-msg{
    margin-top:18px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.05rem;
    color:var(--dress-blue);
  }

  .footer-note{
    margin-top:26px;
    font-family:'Montserrat', sans-serif;
    font-size:.68rem;
    letter-spacing:1.5px;
    color:var(--ink);
    opacity:.5;
    text-transform:uppercase;
  }

  .heart-divider{
    margin: 18px auto 0;
    width:26px;
    height:26px;
    opacity:.55;
  }

  @media (max-width:380px){
    .names{ font-size:2.2rem; }
    .cd-unit{ min-width:48px; padding:8px 5px 6px;}
    .cd-num{ font-size:1.2rem; }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="stage">

<div class="invite-stack">

    <div class="envelope">
      <div class="env-back">
        <div class="env-inner-shadow"></div>
      </div>

        <span>ISAÍAS &amp; MABEL</span>

      <div class="env-flap-right"></div>
      <div class="env-flap-bottom"></div>

      <div class="env-flap-top">
        <div class="env-flap-top-face">
          <div class="seal" id="seal" role="button" aria-label="Abrir invitación">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 21C12 21 3 15.5 3 9.5C3 6.5 5.3 4.3 8 4.3C9.7 4.3 11.1 5.2 12 6.5C12.9 5.2 14.3 4.3 16 4.3C18.7 4.3 21 6.5 21 9.5C21 15.5 12 21 12 21Z" fill="#fbf7f0" opacity="0.9"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="env-wrap-front"></div>
    </div>
    <div id="tap-hint">Toca el sobre para abrir</div>
  </div>

<script>
  const seal = document.getElementById('seal');
  const envelopeWrap = document.getElementById('envelope-wrap');
  const card = document.getElementById('card');

  seal.addEventListener('click', openEnvelope);
  envelopeWrap.addEventListener('click', openEnvelope);

  function openEnvelope(){
    if(envelopeWrap.classList.contains('opening')) return;
    envelopeWrap.classList.add('opening');
    document.getElementById('tap-hint').style.opacity = '0';
    setTimeout(()=>{
      envelopeWrap.classList.add('hidden');
      card.classList.add('show');
    }, 900);
  }

  // Countdown to Jan 2, 2026 18:00 (America/Santo_Domingo, UTC-4, no DST)
  const target = new Date('2027-01-02T18:00:00-04:00').getTime();

  function tick(){
    const now = Date.now();
    const diff = target - now;

    if(diff <= 0){
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('past-msg').style.display = 'block';
      clearInterval(timer);
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
    const secs = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById('cd-days').textContent = String(days).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('cd-mins').textContent = String(mins).padStart(2,'0');
    document.getElementById('cd-secs').textContent = String(secs).padStart(2,'0');
  }

  tick();
  const timer = setInterval(tick, 1000);
</script>
